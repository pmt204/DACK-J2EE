# =====================================================
# VietTicket - Application Configuration (Laragon)
# =====================================================

# ===== Server =====
server.port=8080

# ===== Database: MySQL (Laragon Default) =====
spring.datasource.url=jdbc:mysql://localhost:3306/ticketdb?useSSL=false&serverTimezone=Asia/Ho_Chi_Minh&allowPublicKeyRetrieval=true&characterEncoding=UTF-8
spring.datasource.username=root
# Mặc định MySQL của Laragon không có password, nên để trống
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== Connection Pool (HikariCP - mặc định của Spring Boot) =====
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000

# ===== JPA / Hibernate =====
# update: tự tạo/cập nhật bảng dựa trên entity (dùng cho dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ===== Thymeleaf =====
spring.thymeleaf.cache=false
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.mode=HTML

# ===== Logging =====
logging.level.org.springframework.security=WARN
logging.level.com.example.ticketbooking=DEBUG
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql=TRACE

# ===== Thông báo lỗi đẹp hơn =====
server.error.whitelabel.enabled=false

# ===== Upload file =====
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# ===== Email Notification (để gửi email xác nhận khi đặt vé thành công) =====
spring.mail.host=smtp.gmail.com
spring.mail.port=587

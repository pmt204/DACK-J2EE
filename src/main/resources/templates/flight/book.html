<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đặt vé máy bay - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <div class="row g-4">
        <!-- Thông tin chuyến bay đi -->
        <div class="col-md-5">
            <div class="card shadow-sm border-primary">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0"><i class="bi bi-airplane"></i> Chuyến bay đi</h5>
                </div>
                <div class="card-body">
                    <div class="text-center mb-3">
                        <span class="badge bg-primary fs-6" th:text="${flight.flightNumber}"></span>
                        <span class="ms-2 text-muted" th:text="${flight.airline.airlineName}"></span>
                        <div class="small text-muted" th:text="${flight.airline.airlineCode}"></div>
                    </div>
                    <div class="d-flex justify-content-between align-items-center py-3 border-bottom">
                        <div class="text-center">
                            <div class="fw-bold fs-4" th:text="${flight.origin}"></div>
                            <div class="text-primary fw-bold fs-5"
                                 th:text="${#temporals.format(flight.departureTime, 'HH:mm')}"></div>
                            <small class="text-muted"
                                   th:text="${#temporals.format(flight.departureTime, 'dd/MM/yyyy')}"></small>
                        </div>
                        <div class="text-center text-muted">
                            <div class="fs-2">✈</div>
                        </div>
                        <div class="text-center">
                            <div class="fw-bold fs-4" th:text="${flight.destination}"></div>
                            <div class="text-primary fw-bold fs-5"
                                 th:text="${#temporals.format(flight.arrivalTime, 'HH:mm')}"></div>
                            <small class="text-muted"
                                   th:text="${#temporals.format(flight.arrivalTime, 'dd/MM/yyyy')}"></small>
                        </div>
                    </div>
                    <div class="mt-3">
                        <div class="d-flex justify-content-between">
                            <span class="text-muted">Giá mỗi ghế:</span>
                            <span class="fw-bold text-danger fs-5"
                                  th:text="${#numbers.formatDecimal(flight.price, 1, 'POINT', 0, 'COMMA')} + ' ₫'"></span>
                        </div>
                        <div class="d-flex justify-content-between mt-1">
                            <span class="text-muted">Ghế còn trống:</span>
                            <span class="fw-bold text-success" th:text="${flight.availableSeats}"></span>
                        </div>
                        <div th:if="${flight.description}" class="mt-2 p-2 bg-light rounded">
                            <small class="text-muted">
                                <i class="bi bi-info-circle"></i> <span th:text="${flight.description}"></span>
                            </small>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form đặt vé -->
        <div class="col-md-7">
            <div class="card shadow-sm">
                <div class="card-header bg-light">
                    <h5 class="mb-0"><i class="bi bi-person-fill"></i> Thông tin đặt vé</h5>
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/bookings/flight}" th:object="${bookingDto}" method="post">
                        <!-- Hidden fields -->
                        <input type="hidden" th:field="*{bookingType}">
                        <input type="hidden" th:field="*{flightId}">

                        <!-- Loại hành trình -->
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Loại hành trình</label>
                            <div class="d-flex gap-3">
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{tripType}"
                                           value="ONE_WAY" id="oneWay">
                                    <label class="form-check-label" for="oneWay">
                                        <i class="bi bi-arrow-right"></i> Một chiều
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" th:field="*{tripType}"
                                           value="ROUND_TRIP" id="roundTrip"
                                           th:disabled="${#lists.isEmpty(returnFlights)}">
                                    <label class="form-check-label" for="roundTrip">
                                        <i class="bi bi-arrow-left-right"></i> Khứ hồi
                                        <span th:if="${#lists.isEmpty(returnFlights)}"
                                              class="text-muted small">(không có chuyến về)</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Chọn chuyến bay về (ẩn nếu một chiều) -->
                        <div class="mb-3" id="returnFlightSection" style="display:none;">
                            <label class="form-label fw-semibold">
                                Chọn chuyến bay về <span class="text-danger">*</span>
                            </label>
                            <select th:field="*{returnFlightId}" class="form-select" id="returnFlightSelect">
                                <option value="">-- Chọn chuyến bay về --</option>
                                <option th:each="rf : ${returnFlights}"
                                        th:value="${rf.id}"
                                        th:text="${rf.flightNumber} + ' — ' + ${rf.airline.airlineName} + ' | ' +
                                                  ${rf.origin} + ' → ' + ${rf.destination} + ' | ' +
                                                  ${#temporals.format(rf.departureTime, 'HH:mm dd/MM/yyyy')} + ' | ' +
                                                  ${#numbers.formatDecimal(rf.price, 1, 'POINT', 0, 'COMMA')} + ' ₫'"
                                        th:attr="data-price=${rf.price}">
                                </option>
                            </select>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                Họ và tên hành khách <span class="text-danger">*</span>
                            </label>
                            <input type="text" th:field="*{passengerName}"
                                   class="form-control"
                                   th:classappend="${#fields.hasErrors('passengerName')} ? 'is-invalid' : ''"
                                   placeholder="Nhập họ tên đầy đủ">
                            <div class="invalid-feedback" th:errors="*{passengerName}"></div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Email <span class="text-danger">*</span>
                                </label>
                                <input type="email" th:field="*{passengerEmail}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('passengerEmail')} ? 'is-invalid' : ''"
                                       placeholder="email@example.com">
                                <div class="invalid-feedback" th:errors="*{passengerEmail}"></div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Số điện thoại <span class="text-danger">*</span>
                                </label>
                                <input type="tel" th:field="*{passengerPhone}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('passengerPhone')} ? 'is-invalid' : ''"
                                       placeholder="0901234567">
                                <div class="invalid-feedback" th:errors="*{passengerPhone}"></div>
                            </div>
                        </div>

                        <div class="row g-3">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Số ghế <span class="text-danger">*</span>
                                </label>
                                <input type="number" th:field="*{seatCount}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('seatCount')} ? 'is-invalid' : ''"
                                       min="1" th:max="${flight.availableSeats > 10 ? 10 : flight.availableSeats}">
                                <div class="invalid-feedback" th:errors="*{seatCount}"></div>
                                <div class="form-text">Tối đa 10 ghế mỗi lần đặt</div>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Hạng ghế <span class="text-danger">*</span>
                                </label>
                                <select th:field="*{seatClass}" class="form-select" id="seatClassSelect">
                                    <option value="ECONOMY">Phổ thông (Economy)</option>
                                    <option value="BUSINESS">Thương gia (Business) — x1.5</option>
                                </select>
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold">
                                Phương thức thanh toán <span class="text-danger">*</span>
                            </label>
                            <select th:field="*{paymentMethod}" class="form-select">
                                <option value="BANK_TRANSFER">Chuyển khoản ngân hàng</option>
                                <option value="CASH">Tiền mặt tại quầy</option>
                                <option value="E_WALLET">Ví điện tử (MoMo, ZaloPay)</option>
                            </select>
                            <div class="form-text">Thanh toán sẽ được Admin xác nhận sau khi đặt vé</div>
                        </div>

                        <!-- Tóm tắt giá -->
                        <div class="alert alert-warning">
                            <div class="d-flex justify-content-between">
                                <span>Giá mỗi ghế (chiều đi):</span>
                                <strong th:text="${#numbers.formatDecimal(flight.price, 1, 'POINT', 0, 'COMMA')} + ' ₫'"
                                        id="pricePerSeat" th:attr="data-price=${flight.price}"></strong>
                            </div>
                            <div class="d-flex justify-content-between mt-1" id="returnPriceRow" style="display:none;">
                                <span>Giá mỗi ghế (chiều về):</span>
                                <strong id="returnPriceText">--</strong>
                            </div>
                            <div class="d-flex justify-content-between mt-1" id="classMultiplier">
                                <span>Hệ số hạng ghế:</span>
                                <strong id="multiplierText">x1.0</strong>
                            </div>
                            <div class="d-flex justify-content-between border-top pt-2 mt-2">
                                <span class="fw-bold">Tổng tiền:</span>
                                <strong class="text-danger fs-5" id="totalPrice">--</strong>
                            </div>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary btn-lg flex-fill">
                                <i class="bi bi-check-circle"></i> Xác nhận đặt vé
                            </button>
                            <a th:href="@{/flights/list}" class="btn btn-outline-secondary btn-lg">
                                Hủy
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const seatInput = document.querySelector('input[name="seatCount"]');
    const classSelect = document.getElementById('seatClassSelect');
    const priceEl = document.getElementById('pricePerSeat');
    const totalEl = document.getElementById('totalPrice');
    const multiplierText = document.getElementById('multiplierText');
    const pricePerSeat = parseFloat(priceEl.dataset.price);

    // Khứ hồi
    const oneWayRadio = document.getElementById('oneWay');
    const roundTripRadio = document.getElementById('roundTrip');
    const returnSection = document.getElementById('returnFlightSection');
    const returnSelect = document.getElementById('returnFlightSelect');
    const returnPriceRow = document.getElementById('returnPriceRow');
    const returnPriceText = document.getElementById('returnPriceText');

    function updateTotal() {
        const seats = parseInt(seatInput.value) || 0;
        const isBusiness = classSelect.value === 'BUSINESS';
        const multiplier = isBusiness ? 1.5 : 1.0;

        multiplierText.textContent = isBusiness ? 'x1.5 (Thương gia)' : 'x1.0 (Phổ thông)';

        let total = seats * pricePerSeat * multiplier;

        // Cộng giá chuyến về nếu khứ hồi
        if (roundTripRadio && roundTripRadio.checked && returnSelect.value) {
            const selectedOption = returnSelect.options[returnSelect.selectedIndex];
            const returnPrice = parseFloat(selectedOption.dataset.price) || 0;
            total += seats * returnPrice * multiplier;
            returnPriceRow.style.display = 'flex';
            returnPriceText.textContent = returnPrice.toLocaleString('vi-VN') + ' ₫';
        } else {
            returnPriceRow.style.display = 'none';
        }

        totalEl.textContent = total.toLocaleString('vi-VN') + ' ₫';
    }

    function toggleReturnFlight() {
        if (roundTripRadio && roundTripRadio.checked) {
            returnSection.style.display = 'block';
        } else {
            returnSection.style.display = 'none';
            returnSelect.value = '';
        }
        updateTotal();
    }

    seatInput.addEventListener('input', updateTotal);
    classSelect.addEventListener('change', updateTotal);
    returnSelect.addEventListener('change', updateTotal);
    if (oneWayRadio) oneWayRadio.addEventListener('change', toggleReturnFlight);
    if (roundTripRadio) roundTripRadio.addEventListener('change', toggleReturnFlight);

    toggleReturnFlight();
    updateTotal();
</script>
</body>
</html>

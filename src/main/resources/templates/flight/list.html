<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Danh sách chuyến bay - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <!-- Tiêu đề + nút thêm (ADMIN) -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold">
            <i class="bi bi-airplane text-primary"></i> Danh sách chuyến bay
        </h2>
        <a th:href="@{/flights/add}" class="btn btn-success"
           sec:authorize="hasRole('ADMIN')">
            <i class="bi bi-plus-circle"></i> Thêm chuyến bay
        </a>
    </div>

    <!-- Alert messages -->
    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle"></i> <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle"></i> <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Form tìm kiếm riêng lẻ -->
    <div class="card mb-4 shadow-sm">
        <div class="card-header bg-light">
            <strong><i class="bi bi-search"></i> Tìm kiếm chuyến bay</strong>
            <small class="text-muted ms-2">(có thể tìm riêng lẻ từng trường)</small>
        </div>
        <div class="card-body">
            <form th:action="@{/flights/list}" method="get" class="row g-3 align-items-end">
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">Điểm khởi hành</label>
                    <input type="text" name="origin" class="form-control"
                           th:value="${origin}" placeholder="Ví dụ: Hà Nội">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">Điểm đến</label>
                    <input type="text" name="destination" class="form-control"
                           th:value="${destination}" placeholder="Ví dụ: TP. Hồ Chí Minh">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">Hãng hàng không</label>
                    <input type="text" name="airline" class="form-control"
                           th:value="${airline}" placeholder="Ví dụ: VietJet">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">
                        <i class="bi bi-calendar-event"></i> Ngày bay từ
                    </label>
                    <input type="date" name="departureFrom" class="form-control"
                           th:value="${departureFrom}">
                </div>
                <div class="col-md-3">
                    <label class="form-label fw-semibold small">
                        <i class="bi bi-calendar-event"></i> Ngày bay đến
                    </label>
                    <input type="date" name="departureTo" class="form-control"
                           th:value="${departureTo}">
                </div>
                <div class="col-md-3 d-flex gap-2">
                    <button type="submit" class="btn btn-primary flex-fill">
                        <i class="bi bi-search"></i> Tìm
                    </button>
                    <a th:href="@{/flights/list}" class="btn btn-outline-secondary">
                        <i class="bi bi-x-circle"></i> Xóa lọc
                    </a>
                </div>
            </form>
        </div>
    </div>

    <!-- Kết quả -->
    <div th:if="${flights.empty}" class="text-center py-5 text-muted">
        <i class="bi bi-airplane fs-1 d-block mb-3"></i>
        <h5>Không tìm thấy chuyến bay nào</h5>
        <p>Thử thay đổi tiêu chí tìm kiếm</p>
    </div>

    <div th:unless="${flights.empty}">
        <!-- Thông tin kết quả -->
        <p class="text-muted mb-3">
            Tìm thấy <strong th:text="${flights.totalElements}"></strong> chuyến bay
            (Trang <span th:text="${currentPage + 1}"></span>/<span th:text="${totalPages}"></span>)
        </p>

        <!-- Danh sách chuyến bay dạng card -->
        <div class="row g-3 mb-4">
            <div class="col-12" th:each="flight : ${flights.content}">
                <div class="card shadow-sm flight-list-card"
                     th:classappend="${flight.status == 'FULL'} ? 'border-danger opacity-75' : ''">
                    <div class="card-body py-3">
                        <div class="row align-items-center">
                            <!-- Hãng bay + số hiệu -->
                            <div class="col-md-2 text-center border-end">
                                <div class="fw-bold text-primary" th:text="${flight.airline.airlineName}"></div>
                                <small class="text-muted badge bg-light text-dark border"
                                       th:text="${flight.flightNumber}"></small>
                                <div class="small text-muted" th:text="${flight.airline.airlineCode}"></div>
                            </div>
                            <!-- Hành trình -->
                            <div class="col-md-5">
                                <div class="d-flex align-items-center justify-content-around">
                                    <div class="text-center">
                                        <div class="fw-bold fs-5" th:text="${flight.origin}"></div>
                                        <div class="text-muted small"
                                             th:text="${#temporals.format(flight.departureTime, 'HH:mm')}"></div>
                                        <small class="text-muted"
                                               th:text="${#temporals.format(flight.departureTime, 'dd/MM/yyyy')}"></small>
                                    </div>
                                    <div class="text-center text-muted px-3">
                                        <div class="fs-5">✈</div>
                                        <div class="border-top border-2 border-muted my-1" style="width:60px;"></div>
                                    </div>
                                    <div class="text-center">
                                        <div class="fw-bold fs-5" th:text="${flight.destination}"></div>
                                        <div class="text-muted small"
                                             th:text="${#temporals.format(flight.arrivalTime, 'HH:mm')}"></div>
                                        <small class="text-muted"
                                               th:text="${#temporals.format(flight.arrivalTime, 'dd/MM/yyyy')}"></small>
                                    </div>
                                </div>
                            </div>
                            <!-- Ghế + trạng thái -->
                            <div class="col-md-2 text-center">
                                <div class="badge rounded-pill mb-1"
                                     th:classappend="${flight.status == 'AVAILABLE'} ? 'bg-success' :
                                                     (${flight.status == 'FULL'} ? 'bg-danger' : 'bg-warning text-dark')"
                                     th:text="${flight.status == 'AVAILABLE'} ? 'Còn chỗ' :
                                               (${flight.status == 'FULL'} ? 'Hết chỗ' : flight.status)">
                                </div>
                                <div class="small text-muted">
                                    <i class="bi bi-people"></i>
                                    <span th:text="${flight.availableSeats} + ' ghế'"></span>
                                </div>
                            </div>
                            <!-- Giá + actions -->
                            <div class="col-md-3 text-end">
                                <div class="fs-4 fw-bold text-danger mb-2"
                                     th:text="${#numbers.formatDecimal(flight.price, 1, 'POINT', 0, 'COMMA')} + ' ₫'">
                                </div>
                                <!-- Nút đặt vé (USER) -->
                                <a th:href="@{/flights/book/{id}(id=${flight.id})}"
                                   class="btn btn-primary btn-sm me-1"
                                   sec:authorize="hasRole('USER')"
                                   th:classappend="${flight.status == 'FULL'} ? 'disabled' : ''">
                                    <i class="bi bi-ticket"></i> Đặt vé
                                </a>
                                <!-- Nút sửa/xóa (ADMIN) -->
                                <div class="d-inline-flex gap-1" sec:authorize="hasRole('ADMIN')">
                                    <a th:href="@{/flights/book/{id}(id=${flight.id})}"
                                       class="btn btn-primary btn-sm"
                                       th:classappend="${flight.status == 'FULL'} ? 'disabled' : ''">
                                        <i class="bi bi-ticket"></i>
                                    </a>
                                    <a th:href="@{/flights/edit/{id}(id=${flight.id})}"
                                       class="btn btn-warning btn-sm">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/flights/delete/{id}(id=${flight.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Xóa chuyến bay này?')">
                                        <button type="submit" class="btn btn-danger btn-sm">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </div>
                        </div>
                        <!-- Mô tả -->
                        <div th:if="${flight.description != null && !flight.description.isEmpty()}"
                             class="mt-2 small text-muted border-top pt-2">
                            <i class="bi bi-info-circle"></i>
                            <span th:text="${flight.description}"></span>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Phân trang -->
        <nav th:if="${totalPages > 1}" aria-label="Phân trang chuyến bay">
            <ul class="pagination justify-content-center">
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/flights/list(page=0, origin=${origin}, destination=${destination}, airline=${airline}, departureFrom=${departureFrom}, departureTo=${departureTo})}">
                        «
                    </a>
                </li>
                <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/flights/list(page=${currentPage - 1}, origin=${origin}, destination=${destination}, airline=${airline}, departureFrom=${departureFrom}, departureTo=${departureTo})}">
                        ‹
                    </a>
                </li>
                <li class="page-item"
                    th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                    th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
                    th:classappend="${i == currentPage} ? 'active'">
                    <a class="page-link"
                       th:href="@{/flights/list(page=${i}, origin=${origin}, destination=${destination}, airline=${airline}, departureFrom=${departureFrom}, departureTo=${departureTo})}"
                       th:text="${i + 1}"></a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/flights/list(page=${currentPage + 1}, origin=${origin}, destination=${destination}, airline=${airline}, departureFrom=${departureFrom}, departureTo=${departureTo})}">
                        ›
                    </a>
                </li>
                <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                    <a class="page-link"
                       th:href="@{/flights/list(page=${totalPages - 1}, origin=${origin}, destination=${destination}, airline=${airline}, departureFrom=${departureFrom}, departureTo=${departureTo})}">
                        »
                    </a>
                </li>
            </ul>
        </nav>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

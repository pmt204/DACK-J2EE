<!doctype html>
<html
  lang="vi"
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vé của tôi - VietTicket</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
    />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" th:href="@{/css/style.css}" />
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav th:replace="~{fragments/navbar :: navbar}"></nav>

    <div class="container mt-4 flex-grow-1">
      <h2 class="fw-bold mb-4">
        <i class="bi bi-ticket-perforated text-primary"></i> Vé của tôi
      </h2>

      <div
        th:if="${successMessage}"
        class="alert alert-success alert-dismissible fade show"
      >
        <i class="bi bi-check-circle"></i>
        <span th:text="${successMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${errorMessage}"
        class="alert alert-danger alert-dismissible fade show"
      >
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${errorMessage}"></span>
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <div
        th:if="${param.payment != null and param.payment[0] == 'success'}"
        class="alert alert-success alert-dismissible fade show"
      >
        <i class="bi bi-check-circle-fill"></i> Thanh toán vé máy bay qua VNPay
        thành công!
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>
      <div
        th:if="${param.payment != null and param.payment[0] == 'failed'}"
        class="alert alert-danger alert-dismissible fade show"
      >
        <i class="bi bi-x-circle-fill"></i> Giao dịch thanh toán đã bị hủy hoặc
        thất bại!
        <button
          type="button"
          class="btn-close"
          data-bs-dismiss="alert"
        ></button>
      </div>

      <div th:if="${#lists.isEmpty(bookings)}" class="text-center py-5">
        <i class="bi bi-ticket fs-1 text-muted d-block mb-3"></i>
        <h5 class="text-muted">Bạn chưa đặt vé nào</h5>
        <div class="mt-3">
          <a th:href="@{/flights/list}" class="btn btn-primary me-2">
            <i class="bi bi-airplane"></i> Tìm vé máy bay
          </a>
        </div>
      </div>

      <div th:unless="${#lists.isEmpty(bookings)}">
        <div class="row g-3">
          <div class="col-12" th:each="booking : ${bookings}">
            <div
              class="card shadow-sm"
              th:classappend="${booking.status == 'CANCELLED'} ? 'border-danger opacity-75' : 'border-primary'"
            >
              <div class="card-body">
                <div class="row align-items-center">
                  <div class="col-auto">
                    <div class="fs-2 text-center">✈️</div>
                    <span
                      class="badge d-block text-center mt-1"
                      th:classappend="${booking.tripType == 'ROUND_TRIP'} ? 'bg-info' : 'bg-secondary'"
                      th:text="${booking.tripType == 'ROUND_TRIP'} ? 'Khứ hồi' : 'Một chiều'"
                    >
                    </span>
                  </div>

                  <div class="col-md-4">
                    <div th:if="${booking.flight != null}">
                      <div
                        class="fw-bold"
                        th:text="${booking.flight.origin} + ' → ' + ${booking.flight.destination}"
                      ></div>
                      <div class="text-muted small">
                        <span
                          th:text="${booking.flight.airline.airlineName}"
                        ></span>
                        •
                        <span th:text="${booking.flight.flightNumber}"></span>
                      </div>
                      <div class="text-muted small">
                        <i class="bi bi-calendar"></i>
                        <span
                          th:text="${#temporals.format(booking.flight.departureTime, 'HH:mm dd/MM/yyyy')}"
                        ></span>
                      </div>
                    </div>
                    <div
                      th:if="${booking.returnFlight != null}"
                      class="mt-2 pt-2 border-top"
                    >
                      <div class="fw-bold text-info small">
                        <i class="bi bi-arrow-return-left"></i>
                        <span
                          th:text="${booking.returnFlight.origin} + ' → ' + ${booking.returnFlight.destination}"
                        ></span>
                      </div>
                      <div class="text-muted small">
                        <span
                          th:text="${booking.returnFlight.airline.airlineName}"
                        ></span>
                        •
                        <span
                          th:text="${booking.returnFlight.flightNumber}"
                        ></span>
                      </div>
                      <div class="text-muted small">
                        <i class="bi bi-calendar"></i>
                        <span
                          th:text="${#temporals.format(booking.returnFlight.departureTime, 'HH:mm dd/MM/yyyy')}"
                        ></span>
                      </div>
                    </div>
                  </div>

                  <div class="col-md-3">
                    <div class="small">
                      <i class="bi bi-person"></i>
                      <span th:text="${booking.passengerName}"></span>
                    </div>
                    <div class="small text-muted">
                      <i class="bi bi-envelope"></i>
                      <span th:text="${booking.passengerEmail}"></span>
                    </div>
                    <div class="small text-muted">
                      <i class="bi bi-telephone"></i>
                      <span th:text="${booking.passengerPhone}"></span>
                    </div>
                    <div class="small">
                      <i class="bi bi-people"></i>
                      <span th:text="${booking.seatCount} + ' ghế'"></span>
                      <span
                        class="badge ms-1"
                        th:classappend="${booking.seatClass == 'BUSINESS'} ? 'bg-warning text-dark' : 'bg-secondary'"
                        th:text="${booking.seatClass == 'BUSINESS'} ? 'Thương gia' : 'Phổ thông'"
                      >
                      </span>
                    </div>
                  </div>

                  <div class="col-md-2 text-center">
                    <div
                      class="fw-bold text-danger fs-5"
                      th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 'POINT', 0, 'COMMA')} + ' ₫'"
                    ></div>
                    <small class="text-muted"
                      >Mã: #<span th:text="${booking.id}"></span
                    ></small>
                    <div
                      class="small text-muted mt-1"
                      th:text="${#temporals.format(booking.bookingDate, 'dd/MM/yyyy HH:mm')}"
                    ></div>
                  </div>

                  <div class="col-md-2 text-end">
                    <span
                      class="badge fs-6 mb-1"
                      th:classappend="${booking.status == 'CONFIRMED'} ? 'bg-success' : 'bg-danger'"
                      th:text="${booking.status == 'CONFIRMED'} ? '✓ Đã xác nhận' : '✗ Đã hủy'"
                    >
                    </span>
                    <div class="mb-2">
                      <span
                        class="badge small"
                        th:classappend="${booking.paymentStatus == 'PAID'} ? 'bg-success' : 'bg-warning text-dark'"
                        th:text="${booking.paymentStatus == 'PAID'} ? '💰 Đã thanh toán' : '⏳ Chưa thanh toán'"
                      >
                      </span>
                    </div>

                    <div
                      th:if="${booking.status == 'CONFIRMED'}"
                      class="d-grid gap-1 mt-2"
                    >
                      <a
                        th:if="${booking.paymentStatus == 'UNPAID'}"
                        th:href="@{/api/payment/create-payment(bookingId=${booking.id})}"
                        class="btn btn-success btn-sm w-100"
                      >
                        <i class="bi bi-credit-card"></i> Thanh toán VNPay
                      </a>

                      <a
                        th:href="@{/bookings/reschedule/{id}(id=${booking.id})}"
                        class="btn btn-outline-primary btn-sm"
                      >
                        <i class="bi bi-arrow-repeat"></i> Đổi chuyến
                      </a>
                      <form
                        th:action="@{/bookings/cancel/{id}(id=${booking.id})}"
                        method="post"
                        onsubmit="
                          return confirm('Bạn có chắc muốn hủy vé này?');
                        "
                      >
                        <button
                          type="submit"
                          class="btn btn-outline-danger btn-sm w-100"
                        >
                          <i class="bi bi-x-circle"></i> Hủy vé
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <footer class="bg-dark text-light py-3 text-center mt-auto">
      <small class="text-muted">&copy; 2025 VietTicket</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>

<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đổi chuyến bay - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <h2 class="fw-bold mb-4">
        <i class="bi bi-arrow-repeat text-primary"></i> Đổi chuyến bay
    </h2>

    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle"></i>
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <!-- Thông tin vé hiện tại -->
    <div class="card shadow-sm border-primary mb-4">
        <div class="card-header bg-primary text-white">
            <strong><i class="bi bi-ticket-perforated"></i> Vé hiện tại — Mã #<span th:text="${booking.id}"></span></strong>
        </div>
        <div class="card-body">
            <div class="row">
                <div class="col-md-4">
                    <div class="fw-bold fs-5"
                         th:text="${booking.flight.origin} + ' → ' + ${booking.flight.destination}"></div>
                    <div class="text-muted">
                        <span th:text="${booking.flight.airline.airlineName}"></span> •
                        <span th:text="${booking.flight.flightNumber}"></span>
                    </div>
                    <div class="text-muted">
                        <i class="bi bi-calendar"></i>
                        <span th:text="${#temporals.format(booking.flight.departureTime, 'HH:mm dd/MM/yyyy')}"></span>
                    </div>
                </div>
                <div class="col-md-4">
                    <div><i class="bi bi-person"></i> <span th:text="${booking.passengerName}"></span></div>
                    <div><i class="bi bi-people"></i> <span th:text="${booking.seatCount} + ' ghế'"></span></div>
                </div>
                <div class="col-md-4 text-end">
                    <div class="fw-bold text-danger fs-4"
                         th:text="${#numbers.formatDecimal(booking.totalPrice, 1, 'POINT', 0, 'COMMA')} + ' ₫'"></div>
                    <small class="text-muted">Giá hiện tại</small>
                </div>
            </div>
        </div>
    </div>

    <!-- Danh sách chuyến bay có thể đổi -->
    <h4 class="mb-3"><i class="bi bi-airplane"></i> Chọn chuyến bay mới (cùng tuyến)</h4>

    <div th:if="${#lists.isEmpty(availableFlights)}" class="alert alert-warning">
        <i class="bi bi-info-circle"></i> Không có chuyến bay cùng tuyến nào khả dụng để đổi.
    </div>

    <div th:unless="${#lists.isEmpty(availableFlights)}">
        <div class="row g-3">
            <div class="col-12" th:each="flight : ${availableFlights}">
                <div class="card shadow-sm">
                    <div class="card-body">
                        <form th:action="@{/bookings/reschedule/{id}(id=${booking.id})}" method="post"
                              class="row align-items-center">
                            <input type="hidden" name="newFlightId" th:value="${flight.id}">

                            <div class="col-md-3">
                                <div class="fw-bold" th:text="${flight.airline.airlineName} + ' • ' + ${flight.flightNumber}"></div>
                                <div class="text-muted small"
                                     th:text="${flight.origin} + ' → ' + ${flight.destination}"></div>
                            </div>

                            <div class="col-md-3">
                                <div><i class="bi bi-calendar"></i>
                                    <span th:text="${#temporals.format(flight.departureTime, 'HH:mm dd/MM/yyyy')}"></span>
                                </div>
                                <div class="text-muted small">
                                    <i class="bi bi-clock"></i> Đến:
                                    <span th:text="${#temporals.format(flight.arrivalTime, 'HH:mm dd/MM/yyyy')}"></span>
                                </div>
                            </div>

                            <div class="col-md-2 text-center">
                                <span class="badge bg-success"
                                      th:text="${flight.availableSeats} + ' ghế trống'"></span>
                            </div>

                            <div class="col-md-2 text-center">
                                <!-- Giá mới cho số ghế đã đặt -->
                                <div class="fw-bold text-primary fs-5"
                                     th:text="${#numbers.formatDecimal(flight.price * booking.seatCount, 1, 'POINT', 0, 'COMMA')} + ' ₫'"></div>
                                <!-- So sánh giá -->
                                <div th:with="diff=${flight.price * booking.seatCount - booking.totalPrice}">
                                    <span th:if="${diff > 0}" class="badge bg-danger small">
                                        + <span th:text="${#numbers.formatDecimal(diff, 1, 'POINT', 0, 'COMMA')}"></span> ₫
                                    </span>
                                    <span th:if="${diff < 0}" class="badge bg-success small">
                                        <span th:text="${#numbers.formatDecimal(diff, 1, 'POINT', 0, 'COMMA')}"></span> ₫
                                    </span>
                                    <span th:if="${diff == 0}" class="badge bg-secondary small">
                                        Không đổi giá
                                    </span>
                                </div>
                            </div>

                            <div class="col-md-2 text-end">
                                <button type="submit" class="btn btn-primary"
                                        onclick="return confirm('Bạn có chắc muốn đổi sang chuyến bay này?')">
                                    <i class="bi bi-arrow-repeat"></i> Đổi chuyến
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="mt-4">
        <a th:href="@{/bookings/my-bookings}" class="btn btn-outline-secondary">
            <i class="bi bi-arrow-left"></i> Quay lại vé của tôi
        </a>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

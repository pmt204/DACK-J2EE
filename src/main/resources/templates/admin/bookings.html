<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý đặt vé - VietTicket Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold">
            <i class="bi bi-list-check text-primary"></i> Quản lý tất cả đặt vé
        </h2>
        <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary btn-sm">
            <i class="bi bi-arrow-left"></i> Dashboard
        </a>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>Mã</th>
                            <th>Khách hàng</th>
                            <th>Loại vé</th>
                            <th>Hành trình</th>
                            <th>Hành khách</th>
                            <th>Hạng ghế</th>
                            <th>Ghế</th>
                            <th>Tổng tiền</th>
                            <th>Thanh toán</th>
                            <th>Trạng thái</th>
                            <th>Ngày đặt</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="b : ${bookings.content}"
                            th:classappend="${b.status == 'CANCELLED'} ? 'table-secondary' : ''">
                            <td class="fw-bold">#<span th:text="${b.id}"></span></td>
                            <td th:text="${b.user.username}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.tripType == 'ROUND_TRIP'} ? 'bg-info' : 'bg-secondary'"
                                      th:text="${b.tripType == 'ROUND_TRIP'} ? 'Khứ hồi' : 'Một chiều'">
                                </span>
                            </td>
                            <td>
                                <div th:if="${b.flight != null}" class="small"
                                     th:text="${b.flight.flightNumber} + ': ' + ${b.flight.origin} + ' → ' + ${b.flight.destination}">
                                </div>
                                <div th:if="${b.flight != null}" class="small text-muted" th:text="${b.flight.airline.airlineName}"></div>
                                <div th:if="${b.returnFlight != null}" class="small text-info">
                                    <i class="bi bi-arrow-return-left"></i>
                                    <span th:text="${b.returnFlight.flightNumber} + ': ' + ${b.returnFlight.origin} + ' → ' + ${b.returnFlight.destination}"></span>
                                </div>
                            </td>
                            <td>
                                <div class="small" th:text="${b.passengerName}"></div>
                                <div class="small text-muted" th:text="${b.passengerPhone}"></div>
                            </td>
                            <td class="text-center">
                                <span class="badge"
                                      th:classappend="${b.seatClass == 'BUSINESS'} ? 'bg-warning text-dark' : 'bg-secondary'"
                                      th:text="${b.seatClass == 'BUSINESS'} ? 'Thương gia' : 'Phổ thông'">
                                </span>
                            </td>
                            <td class="text-center" th:text="${b.seatCount}"></td>
                            <td class="text-danger fw-bold small"
                                th:text="${#numbers.formatDecimal(b.totalPrice, 1, 'POINT', 0, 'COMMA')} + '₫'">
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.paymentStatus == 'PAID'} ? 'bg-success' : 'bg-warning text-dark'"
                                      th:text="${b.paymentStatus == 'PAID'} ? '✓ Đã TT' : '⏳ Chưa TT'">
                                </span>
                                <div class="small text-muted mt-1"
                                     th:text="${b.paymentMethod == 'BANK_TRANSFER'} ? 'Chuyển khoản' : (${b.paymentMethod == 'CASH'} ? 'Tiền mặt' : (${b.paymentMethod == 'E_WALLET'} ? 'Ví điện tử' : ''))">
                                </div>
                            </td>
                            <td>
                                <span class="badge"
                                      th:classappend="${b.status == 'CONFIRMED'} ? 'bg-success' : 'bg-danger'"
                                      th:text="${b.status == 'CONFIRMED'} ? 'Xác nhận' : 'Đã hủy'">
                                </span>
                            </td>
                            <td class="small"
                                th:text="${#temporals.format(b.bookingDate, 'dd/MM/yy HH:mm')}">
                            </td>
                            <td>
                                <div th:if="${b.status == 'CONFIRMED'}" class="d-flex flex-column gap-1">
                                    <form th:if="${b.paymentStatus != 'PAID'}"
                                          th:action="@{/admin/bookings/confirm-payment/{id}(id=${b.id})}"
                                          method="post">
                                        <button type="submit" class="btn btn-success btn-sm w-100">
                                            <i class="bi bi-check-lg"></i> Xác nhận TT
                                        </button>
                                    </form>
                                    <form th:if="${b.paymentStatus == 'PAID'}"
                                          th:action="@{/admin/bookings/unpaid/{id}(id=${b.id})}"
                                          method="post">
                                        <button type="submit" class="btn btn-outline-warning btn-sm w-100">
                                            <i class="bi bi-arrow-counterclockwise"></i> Hoàn tác TT
                                        </button>
                                    </form>
                                    <form th:action="@{/admin/bookings/cancel/{id}(id=${b.id})}"
                                          method="post"
                                          onsubmit="return confirm('Hủy booking này?')">
                                        <button type="submit" class="btn btn-danger btn-sm w-100">
                                            <i class="bi bi-x"></i> Hủy vé
                                        </button>
                                    </form>
                                </div>
                                <span th:if="${b.status == 'CANCELLED'}" class="text-muted small">--</span>
                            </td>
                        </tr>
                        <tr th:if="${bookings.empty}">
                            <td colspan="12" class="text-center py-4 text-muted">
                                Chưa có đặt vé nào
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div class="card-footer d-flex justify-content-between align-items-center"
             th:if="${totalPages > 1}">
            <span class="text-muted small">
                Tổng: <strong th:text="${bookings.totalElements}"></strong> đặt vé
            </span>
            <nav>
                <ul class="pagination pagination-sm mb-0">
                    <li class="page-item" th:classappend="${currentPage == 0} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/bookings(page=${currentPage - 1})}">‹</a>
                    </li>
                    <li class="page-item"
                        th:each="i : ${#numbers.sequence(0, totalPages - 1)}"
                        th:if="${i >= currentPage - 2 && i <= currentPage + 2}"
                        th:classappend="${i == currentPage} ? 'active'">
                        <a class="page-link" th:href="@{/admin/bookings(page=${i})}"
                           th:text="${i + 1}"></a>
                    </li>
                    <li class="page-item" th:classappend="${currentPage == totalPages - 1} ? 'disabled'">
                        <a class="page-link" th:href="@{/admin/bookings(page=${currentPage + 1})}">›</a>
                    </li>
                </ul>
            </nav>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-4">
    <small class="text-muted">&copy; 2025 VietTicket Admin</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

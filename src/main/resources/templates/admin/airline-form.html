<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${isEdit} ? 'Sửa hãng bay' : 'Thêm hãng bay'">Form hãng bay</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card shadow">
                <div class="card-header py-3"
                     th:classappend="${isEdit} ? 'bg-warning' : 'bg-success text-white'">
                    <h4 class="mb-0">
                        <i th:class="${isEdit} ? 'bi bi-pencil-square' : 'bi bi-plus-circle'"></i>
                        <span th:text="${isEdit} ? 'Sửa hãng hàng không' : 'Thêm hãng hàng không mới'"></span>
                    </h4>
                </div>
                <div class="card-body p-4">
                    <form th:action="${isEdit} ? @{/admin/airlines/edit/{id}(id=${airlineDto.id})} : @{/admin/airlines/add}"
                          th:object="${airlineDto}" method="post">

                        <div class="row g-3">
                            <div class="col-md-4">
                                <label class="form-label fw-semibold">
                                    Mã hãng bay <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{airlineCode}"
                                       class="form-control text-uppercase"
                                       th:classappend="${#fields.hasErrors('airlineCode')} ? 'is-invalid' : ''"
                                       placeholder="VN" maxlength="10">
                                <div class="invalid-feedback" th:errors="*{airlineCode}"></div>
                                <div class="form-text">Vd: VN, VJ, QH, BL</div>
                            </div>

                            <div class="col-md-8">
                                <label class="form-label fw-semibold">
                                    Tên hãng bay <span class="text-danger">*</span>
                                </label>
                                <input type="text" th:field="*{airlineName}"
                                       class="form-control"
                                       th:classappend="${#fields.hasErrors('airlineName')} ? 'is-invalid' : ''"
                                       placeholder="Vietnam Airlines">
                                <div class="invalid-feedback" th:errors="*{airlineName}"></div>
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Quốc gia</label>
                                <input type="text" th:field="*{country}"
                                       class="form-control"
                                       placeholder="Việt Nam">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label fw-semibold">Trạng thái</label>
                                <select th:field="*{status}" class="form-select">
                                    <option value="ACTIVE">Hoạt động</option>
                                    <option value="INACTIVE">Ngừng hoạt động</option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label class="form-label fw-semibold">Logo URL (tùy chọn)</label>
                                <input type="text" th:field="*{logoUrl}"
                                       class="form-control"
                                       placeholder="https://...">
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-4">
                            <button type="submit" class="btn px-4"
                                    th:classappend="${isEdit} ? 'btn-warning' : 'btn-success'">
                                <i th:class="${isEdit} ? 'bi bi-save' : 'bi bi-plus-circle'"></i>
                                <span th:text="${isEdit} ? 'Cập nhật' : 'Thêm mới'"></span>
                            </button>
                            <a th:href="@{/admin/airlines}" class="btn btn-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket Admin</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

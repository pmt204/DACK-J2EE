<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quản lý hãng bay - VietTicket Admin</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold">
            <i class="bi bi-building text-primary"></i> Quản lý hãng hàng không
        </h2>
        <div class="d-flex gap-2">
            <a th:href="@{/admin/airlines/add}" class="btn btn-success">
                <i class="bi bi-plus-circle"></i> Thêm hãng bay
            </a>
            <a th:href="@{/admin/dashboard}" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-arrow-left"></i> Dashboard
            </a>
        </div>
    </div>

    <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
        <span th:text="${successMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
        <span th:text="${errorMessage}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <div class="table-responsive">
                <table class="table table-hover table-striped mb-0">
                    <thead class="table-dark">
                        <tr>
                            <th>ID</th>
                            <th>Mã hãng</th>
                            <th>Tên hãng bay</th>
                            <th>Quốc gia</th>
                            <th>Trạng thái</th>
                            <th>Ngày tạo</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="a : ${airlines}">
                            <td class="fw-bold" th:text="${a.id}"></td>
                            <td>
                                <span class="badge bg-primary" th:text="${a.airlineCode}"></span>
                            </td>
                            <td class="fw-bold" th:text="${a.airlineName}"></td>
                            <td th:text="${a.country}"></td>
                            <td>
                                <span class="badge"
                                      th:classappend="${a.status == 'ACTIVE'} ? 'bg-success' : 'bg-secondary'"
                                      th:text="${a.status == 'ACTIVE'} ? 'Hoạt động' : 'Ngừng'">
                                </span>
                            </td>
                            <td class="small"
                                th:text="${#temporals.format(a.createdAt, 'dd/MM/yyyy HH:mm')}"></td>
                            <td>
                                <div class="d-flex gap-1">
                                    <a th:href="@{/admin/airlines/edit/{id}(id=${a.id})}"
                                       class="btn btn-warning btn-sm">
                                        <i class="bi bi-pencil"></i>
                                    </a>
                                    <form th:action="@{/admin/airlines/delete/{id}(id=${a.id})}"
                                          method="post" class="d-inline"
                                          onsubmit="return confirm('Xóa hãng bay này?')">
                                        <button type="submit" class="btn btn-danger btn-sm">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </div>
                            </td>
                        </tr>
                        <tr th:if="${#lists.isEmpty(airlines)}">
                            <td colspan="7" class="text-center py-4 text-muted">
                                Chưa có hãng bay nào. Hãy thêm hãng bay mới!
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-4">
    <small class="text-muted">&copy; 2025 VietTicket Admin</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

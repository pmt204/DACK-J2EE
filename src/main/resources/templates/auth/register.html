<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng ký - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="col-sm-10 col-md-7 col-lg-5">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-success text-white text-center py-4">
                <h3 class="mb-0">✈️ VietTicket</h3>
                <p class="mb-0 opacity-75">Tạo tài khoản mới</p>
            </div>
            <div class="card-body p-4">

                <!--
                  th:object="${userDto}" - bind form với UserRegistrationDto
                  th:field="*{fieldName}" - bind từng field
                  th:errors="*{fieldName}" - hiển thị lỗi validation
                -->
                <form th:action="@{/auth/register}" th:object="${userDto}" method="post"
                      novalidate>

                    <!-- Username -->
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-person text-success"></i> Tên đăng nhập
                            <span class="text-danger">*</span>
                        </label>
                        <input type="text" id="username" th:field="*{username}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('username')} ? 'is-invalid' : ''"
                               placeholder="Từ 3-50 ký tự, chỉ chữ/số/gạch dưới">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('username')}"
                             th:errors="*{username}"></div>
                    </div>

                    <!-- Email -->
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">
                            <i class="bi bi-envelope text-success"></i> Email
                            <span class="text-danger">*</span>
                        </label>
                        <input type="email" id="email" th:field="*{email}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('email')} ? 'is-invalid' : ''"
                               placeholder="example@email.com">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('email')}"
                             th:errors="*{email}"></div>
                    </div>

                    <!-- Password -->
                    <div class="mb-3">
                        <label for="password" class="form-label fw-semibold">
                            <i class="bi bi-lock text-success"></i> Mật khẩu
                            <span class="text-danger">*</span>
                        </label>
                        <input type="password" id="password" th:field="*{password}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('password')} ? 'is-invalid' : ''"
                               placeholder="Ít nhất 6 ký tự">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('password')}"
                             th:errors="*{password}"></div>
                    </div>

                    <!-- Confirm Password -->
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-semibold">
                            <i class="bi bi-lock-fill text-success"></i> Xác nhận mật khẩu
                            <span class="text-danger">*</span>
                        </label>
                        <input type="password" id="confirmPassword" th:field="*{confirmPassword}"
                               class="form-control"
                               th:classappend="${#fields.hasErrors('confirmPassword')} ? 'is-invalid' : ''"
                               placeholder="Nhập lại mật khẩu">
                        <div class="invalid-feedback"
                             th:if="${#fields.hasErrors('confirmPassword')}"
                             th:errors="*{confirmPassword}"></div>
                    </div>

                    <div class="d-grid">
                        <button type="submit" class="btn btn-success btn-lg">
                            <i class="bi bi-person-plus"></i> Đăng ký
                        </button>
                    </div>
                </form>

                <hr class="my-3">

                <div class="text-center">
                    <span class="text-muted">Đã có tài khoản? </span>
                    <a th:href="@{/auth/login}" class="fw-semibold text-decoration-none">
                        Đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">© 2024 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

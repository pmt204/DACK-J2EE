<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quên mật khẩu - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-warning text-dark text-center py-4">
                <h3 class="mb-0"><i class="bi bi-key"></i> Quên mật khẩu</h3>
                <p class="mb-0 opacity-75">Nhập username và email để xác minh</p>
            </div>
            <div class="card-body p-4">

                <!-- Thông báo lỗi -->
                <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-triangle"></i>
                    <span th:text="${errorMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <form th:action="@{/auth/forgot-password}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-person text-primary"></i> Tên đăng nhập
                        </label>
                        <input type="text" id="username" name="username"
                               class="form-control form-control-lg"
                               placeholder="Nhập tên đăng nhập" autofocus required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label fw-semibold">
                            <i class="bi bi-envelope text-primary"></i> Email đã đăng ký
                        </label>
                        <input type="email" id="email" name="email"
                               class="form-control form-control-lg"
                               placeholder="Nhập email" required>
                    </div>

                    <hr>

                    <div class="mb-3">
                        <label for="newPassword" class="form-label fw-semibold">
                            <i class="bi bi-lock-fill text-primary"></i> Mật khẩu mới
                        </label>
                        <input type="password" id="newPassword" name="newPassword"
                               class="form-control form-control-lg"
                               placeholder="Tối thiểu 6 ký tự" required minlength="6">
                    </div>
                    <div class="mb-4">
                        <label for="confirmPassword" class="form-label fw-semibold">
                            <i class="bi bi-lock-fill text-primary"></i> Xác nhận mật khẩu mới
                        </label>
                        <input type="password" id="confirmPassword" name="confirmPassword"
                               class="form-control form-control-lg"
                               placeholder="Nhập lại mật khẩu mới" required minlength="6">
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-warning btn-lg">
                            <i class="bi bi-check-lg"></i> Đặt lại mật khẩu
                        </button>
                    </div>
                </form>

                <hr class="my-3">

                <div class="text-center">
                    <a th:href="@{/auth/login}" class="text-decoration-none">
                        <i class="bi bi-arrow-left"></i> Quay lại đăng nhập
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

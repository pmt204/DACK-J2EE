<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đăng nhập - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center py-5">
    <div class="col-sm-10 col-md-6 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-header bg-primary text-white text-center py-4">
                <h3 class="mb-0">✈️ VietTicket</h3>
                <p class="mb-0 opacity-75">Đăng nhập tài khoản</p>
            </div>
            <div class="card-body p-4">

                <!-- Thông báo logout thành công -->
                <div th:if="${param.logout}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle"></i> Bạn đã đăng xuất thành công.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Thông báo login thất bại -->
                <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show">
                    <i class="bi bi-exclamation-triangle"></i>
                    Tên đăng nhập hoặc mật khẩu không đúng. Vui lòng thử lại.
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Flash message từ trang đăng ký -->
                <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                    <i class="bi bi-check-circle"></i>
                    <span th:text="${successMessage}"></span>
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>

                <!-- Form đăng nhập - Spring Security xử lý POST /auth/login -->
                <form th:action="@{/auth/login}" method="post">
                    <div class="mb-3">
                        <label for="username" class="form-label fw-semibold">
                            <i class="bi bi-person text-primary"></i> Tên đăng nhập
                        </label>
                        <input type="text" id="username" name="username"
                               class="form-control form-control-lg"
                               placeholder="Nhập tên đăng nhập" autofocus required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label fw-semibold">
                            <i class="bi bi-lock text-primary"></i> Mật khẩu
                        </label>
                        <input type="password" id="password" name="password"
                               class="form-control form-control-lg"
                               placeholder="Nhập mật khẩu" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-primary btn-lg">
                            <i class="bi bi-box-arrow-in-right"></i> Đăng nhập
                        </button>
                    </div>
                </form>

                <div class="text-end mt-2">
                    <a th:href="@{/auth/forgot-password}" class="text-muted small text-decoration-none">
                        <i class="bi bi-question-circle"></i> Quên mật khẩu?
                    </a>
                </div>

                <hr class="my-3">

                <div class="text-center">
                    <span class="text-muted">Chưa có tài khoản? </span>
                    <a th:href="@{/auth/register}" class="fw-semibold text-decoration-none">
                        Đăng ký ngay
                    </a>
                </div>

            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">© 2024 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

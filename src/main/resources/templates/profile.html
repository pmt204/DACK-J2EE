<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Hồ sơ cá nhân - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-8">
            <h2 class="fw-bold mb-4">
                <i class="bi bi-person-circle text-primary"></i> Hồ sơ cá nhân
            </h2>

            <!-- Thông báo thành công -->
            <div th:if="${successMessage}" class="alert alert-success alert-dismissible fade show">
                <i class="bi bi-check-circle"></i>
                <span th:text="${successMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <div class="row">
                        <!-- Avatar -->
                        <div class="col-md-4 text-center mb-3">
                            <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mx-auto"
                                 style="width: 120px; height: 120px;">
                                <i class="bi bi-person-fill" style="font-size: 3.5rem;"></i>
                            </div>
                            <h4 class="mt-3 fw-bold" th:text="${user.username}"></h4>
                            <div>
                                <span th:each="role : ${user.roles}"
                                      class="badge me-1"
                                      th:classappend="${role.name == 'ROLE_ADMIN'} ? 'bg-danger' : 'bg-info'"
                                      th:text="${role.name == 'ROLE_ADMIN'} ? 'ADMIN' : 'USER'">
                                </span>
                            </div>
                        </div>

                        <!-- Info -->
                        <div class="col-md-8">
                            <h5 class="fw-bold mb-3">Thông tin tài khoản</h5>
                            <table class="table table-borderless">
                                <tr>
                                    <td class="text-muted" style="width: 150px;">
                                        <i class="bi bi-person"></i> Tên đăng nhập:
                                    </td>
                                    <td class="fw-bold" th:text="${user.username}"></td>
                                </tr>
                                <tr>
                                    <td class="text-muted">
                                        <i class="bi bi-envelope"></i> Email:
                                    </td>
                                    <td th:text="${user.email}"></td>
                                </tr>
                                <tr>
                                    <td class="text-muted">
                                        <i class="bi bi-shield-check"></i> Trạng thái:
                                    </td>
                                    <td>
                                        <span class="badge bg-success" th:if="${user.enabled}">Hoạt động</span>
                                        <span class="badge bg-danger" th:unless="${user.enabled}">Bị khóa</span>
                                    </td>
                                </tr>
                            </table>

                            <div class="mt-3">
                                <a th:href="@{/profile/change-password}" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-key"></i> Đổi mật khẩu
                                </a>
                            </div>

                            <hr>

                            <h5 class="fw-bold mb-3">Thống kê</h5>
                            <div class="row g-3">
                                <div class="col-6">
                                    <div class="card bg-light text-center p-3">
                                        <div class="fs-2 fw-bold text-primary" th:text="${totalBookings}">0</div>
                                        <div class="text-muted small">Tổng số vé đã đặt</div>
                                    </div>
                                </div>
                                <div class="col-6">
                                    <a th:href="@{/bookings/my-bookings}" class="card bg-light text-center p-3 text-decoration-none">
                                        <div class="fs-2">✈️</div>
                                        <div class="text-muted small">Xem vé của tôi</div>
                                    </a>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">© 2025 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

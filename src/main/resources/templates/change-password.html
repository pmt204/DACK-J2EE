<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Đổi mật khẩu - VietTicket</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container mt-4 flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <h2 class="fw-bold mb-4">
                <i class="bi bi-key text-primary"></i> Đổi mật khẩu
            </h2>

            <!-- Thông báo lỗi -->
            <div th:if="${errorMessage}" class="alert alert-danger alert-dismissible fade show">
                <i class="bi bi-exclamation-triangle"></i>
                <span th:text="${errorMessage}"></span>
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <form th:action="@{/profile/change-password}" method="post">
                        <div class="mb-3">
                            <label for="currentPassword" class="form-label">
                                <i class="bi bi-lock"></i> Mật khẩu hiện tại
                            </label>
                            <input type="password" class="form-control" id="currentPassword"
                                   name="currentPassword" required>
                        </div>

                        <hr>

                        <div class="mb-3">
                            <label for="newPassword" class="form-label">
                                <i class="bi bi-lock-fill"></i> Mật khẩu mới
                            </label>
                            <input type="password" class="form-control" id="newPassword"
                                   name="newPassword" required minlength="6">
                            <div class="form-text">Tối thiểu 6 ký tự</div>
                        </div>

                        <div class="mb-3">
                            <label for="confirmPassword" class="form-label">
                                <i class="bi bi-lock-fill"></i> Xác nhận mật khẩu mới
                            </label>
                            <input type="password" class="form-control" id="confirmPassword"
                                   name="confirmPassword" required minlength="6">
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg"></i> Đổi mật khẩu
                            </button>
                            <a th:href="@{/profile}" class="btn btn-outline-secondary">
                                <i class="bi bi-arrow-left"></i> Quay lại
                            </a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">&copy; 2025 VietTicket</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>403 - Không có quyền truy cập</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body class="d-flex flex-column min-vh-100">

<nav th:replace="~{fragments/navbar :: navbar}"></nav>

<div class="container flex-grow-1 d-flex align-items-center justify-content-center">
    <div class="text-center py-5">
        <div style="font-size: 6rem;">🚫</div>
        <h1 class="display-1 fw-bold text-danger">403</h1>
        <h3 class="mb-3">Không có quyền truy cập!</h3>
        <p class="text-muted mb-4">
            Bạn không có quyền thực hiện hành động này.<br>
            Chỉ quản trị viên (ADMIN) mới có quyền truy cập trang này.
        </p>
        <div class="d-flex gap-2 justify-content-center">
            <a th:href="@{/home}" class="btn btn-primary btn-lg">
                <i class="bi bi-house-door"></i> Về trang chủ
            </a>
            <a th:href="@{/flights/list}" class="btn btn-outline-primary btn-lg">
                <i class="bi bi-airplane"></i> Xem chuyến bay
            </a>
        </div>
    </div>
</div>

<footer class="bg-dark text-light py-3 text-center mt-auto">
    <small class="text-muted">© 2024 VietTicket</small>
</footer>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
